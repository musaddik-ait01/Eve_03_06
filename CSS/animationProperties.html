        *{
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f4f4;
        }

        .loader{
            width: 80px;
            height: 80px;
            /* background-color: red; */
            /* border: 8px solid #dcdcdc; */
            border-top: 8px solid #177bcc;
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }

        .small{
            width: 40px;
            height: 40px;
            /* background-color: red; */
            /* border: 5px solid #dcdcdc; */
            border-top: 5px solid #df5e08;
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate{
            from{
                transform: rotate(360deg);
            }
            to{
                transform: rotate(0deg);
            }
        }
    </style>
