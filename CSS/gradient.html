<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 1. Linear */
        .linear{
            height: 300px;
            width: 500px;
            background-image: linear-gradient(to left,red,yellow);
            font-size: larger;
            font-weight: bolder;
            text-align: center;

        }
        /* 2. Radial */
        .radial{
            margin-top: 40px;
            height: 300px;
            width: 500px;
            /* background-image: radial-gradient(red, yellow); */
            background-image: repeating-radial-gradient(black 10%,rgb(248, 248, 240) 15%);
            font-size: larger;
            font-weight: bolder;
            text-align: center;
        }
        /* 3. Conic */

        .conic{
            margin-top: 40px;
            height: 300px;
            width: 500px;
            background-image: conic-gradient(red,green,yellow);
            font-size: larger;
            font-weight: bolder;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Gradiient CSS</h2>

    <div class="linear">Linear Gradient</div>
    <div class="radial">Radial Gradient</div>
    <div class="conic">conic Gradient</div>
    
</body>
</html>
