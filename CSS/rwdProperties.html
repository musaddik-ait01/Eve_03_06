        /* Example */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background: #f4f4f4;
            padding: 30px;
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        .container{
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card{
            background: white;
            width: 23%;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 10px rgba(0,0, 0, .2);
            transition: .3s;
        }

        .card:hover{
            transform: translateY(-5px);
        }

        .card img{
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card h2{
            padding: 15px 15px 5px;
        }

        .card p{
            padding: 0 15px;
            color: gray;
        }

        .card button{
            margin: 15px;
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        .card button:hover{
            background: #0056b3;
        }

        /* tablet */

        @media (max-width:1023px) {
            .card{
                width: 48%;
            }
        }

        /* mobile */

        @media (max-width:767px){

            body{
                padding: 15px;
            }

            .card{
                width: 100%;
            }

            h1{
                font-size: 29px;
            }

        }
    </style>
