<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            position: relative;
        }
        .box2{
            position: relative;
            z-index: 2;
            border: solid;
            height: 100px;
            margin: 50px;
        }
        .box1{
            position: absolute;
            z-index: 1;
            background: red;
            width: 25%;
            height: 90%;
            left: 30%;
            top: -20px;
            opacity: 0.8;
        }
        .box3{
            position: absolute;
            z-index: 3;
            background: rgb(26, 69, 222);
            width: 25%;
            height: 35%;
            left: 90px;
            top: 55px;
        }
    </style>
</head>
<body>
    <h2>Z-index Property</h2>

    <div class="container">
        <div class="box1">Item-1---z-index:2</div>
        <div class="box2">Item-2---z-index:1</div>
        <div class="box3">Item-3---z-index:3</div>
    </div>
</body>
</html>
