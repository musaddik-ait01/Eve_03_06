    <style>
      /* Pseudo selectors - ( : ) 
    any elem/tag/id/class : pseudo property {

            propertyName : propertyValues;
            }*/

      * {
        text-align: center;
      }

      /* :first-child, last-child, nth-child*/

      /* #div1{
        border: 2px solid red;
      } */

      p{
        border: 2px solid black;
      }

      p:first-child{
        background-color: yellow;
        color: black;
        font-weight: bolder;
      }
      p:last-child{
        background-color: red;
        color: white;
        font-weight: bolder;
      }
      p:nth-child(2){
        background-color: aqua;
      }

      /* :link, visited, active */
      a:link{
        color: red;
      }
      a:visited{
        color: black;
      }
      a:active{
        color: green;
      }
    </style>
